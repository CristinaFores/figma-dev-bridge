<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body {
    margin: 0;
    padding: 12px 16px;
    font-family: Inter, sans-serif;
    font-size: 12px;
    color: #333;
    background: #fff;
  }
  .row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #999; flex-shrink: 0; }
  .dot.connected { background: #18a247; }
  .dot.error     { background: #e53e3e; }
  #status    { color: #555; }
  #selection { color: #888; font-size: 11px; margin-bottom: 10px; }
  .actions { display: flex; gap: 6px; margin-bottom: 8px; }
  button {
    font-family: inherit;
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid #ddd;
    background: #f5f5f5;
    cursor: pointer;
  }
  button.primary { background: #18a247; border-color: #18a247; color: #fff; }
  button:disabled { opacity: 0.5; cursor: default; }
  #note { color: #999; font-size: 10px; line-height: 1.4; margin-bottom: 8px; }
  .info-box {
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 10px;
    color: #555;
    line-height: 1.5;
    margin-top: 4px;
  }
  .info-box.setup-required {
    background: #f0f4ff;
    border: 1px solid #c7d7ff;
  }
  .info-box.not-running {
    display: none;
    background: #fff8e1;
    border: 1px solid #ffe082;
  }
  .info-box a { color: #0066cc; }
</style>
</head>
<body>
<div class="row">
  <div class="dot" id="dot"></div>
  <span id="status">Sync paused</span>
</div>
<div id="selection">No selection</div>

<div class="actions">
  <button id="syncBtn" class="primary">Sync selection</button>
  <button id="pauseBtn" disabled>Pause</button>
</div>

<div id="note">Only sends data to localhost. Does not modify your file.</div>

<div class="info-box setup-required" id="setupRequired">
  <strong>Requires local tool:</strong> start <em>design-context-bridge</em> on your machine before syncing.<br/>
  <a href="https://github.com/CristinaFores/design-context-bridge" target="_blank">Setup instructions →</a>
</div>

<div class="info-box not-running" id="notRunning">
  <strong>Local tool not running.</strong><br/>
  Run <code>npx design-context-bridge</code> in your terminal, then sync again.<br/>
  <a href="https://github.com/CristinaFores/design-context-bridge" target="_blank">Full setup →</a>
</div>

<script>
  var dot = document.getElementById('dot');
  var statusEl = document.getElementById('status');
  var selectionEl = document.getElementById('selection');
  var syncBtn = document.getElementById('syncBtn');
  var pauseBtn = document.getElementById('pauseBtn');
  var setupRequired = document.getElementById('setupRequired');
  var notRunning = document.getElementById('notRunning');

  syncBtn.onclick = function () {
    parent.postMessage({ pluginMessage: { type: 'sync' } }, '*');
  };
  pauseBtn.onclick = function () {
    parent.postMessage({ pluginMessage: { type: 'pause' } }, '*');
  };

  window.onmessage = function (event) {
    var msg = event.data.pluginMessage;
    if (!msg || msg.type !== 'status') return;

    var syncEnabled = !!msg.syncEnabled;
    var isNotRunning = syncEnabled && !msg.connected;

    syncBtn.disabled = syncEnabled;
    pauseBtn.disabled = !syncEnabled;

    // show "requires local tool" only in paused state, hide when syncing
    setupRequired.style.display = !syncEnabled ? 'block' : 'none';
    notRunning.style.display = isNotRunning ? 'block' : 'none';

    if (!syncEnabled) {
      dot.className = 'dot';
      statusEl.textContent = 'Sync paused';
    } else if (msg.connected) {
      dot.className = 'dot connected';
      statusEl.textContent = 'Connected to local handoff tool';
    } else {
      dot.className = 'dot error';
      statusEl.textContent = 'Local handoff tool not running';
    }

    var count = msg.count || 0;
    selectionEl.textContent = count === 0
      ? 'No selection'
      : count + ' element' + (count === 1 ? '' : 's') + ' selected';
  };
</script>
</body>
</html>
