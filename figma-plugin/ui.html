<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body {
    margin: 0;
    padding: 12px 16px;
    font-family: Inter, sans-serif;
    font-size: 12px;
    color: #333;
    background: #fff;
  }
  .row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #999; flex-shrink: 0; }
  .dot.connected { background: #18a247; }
  .dot.error     { background: #e53e3e; }
  #status    { color: #555; }
  #selection { color: #888; font-size: 11px; }
</style>
</head>
<body>
<div class="row">
  <div class="dot" id="dot"></div>
  <span id="status">Iniciando...</span>
</div>
<div id="selection">Sin selección</div>

<script>
  var dot = document.getElementById('dot');
  var statusEl = document.getElementById('status');
  var selectionEl = document.getElementById('selection');

  window.onmessage = function (event) {
    var msg = event.data.pluginMessage;
    if (!msg || msg.type !== 'status') return;

    if (msg.connected) {
      dot.className = 'dot connected';
      statusEl.textContent = 'Conectado al bridge';
    } else {
      dot.className = 'dot error';
      statusEl.textContent = 'Sin bridge — arranca el servidor MCP';
    }

    var count = msg.count || 0;
    selectionEl.textContent = count === 0
      ? 'Sin selección'
      : count + ' elemento' + (count === 1 ? '' : 's') + ' seleccionado' + (count === 1 ? '' : 's');
  };
</script>
</body>
</html>
