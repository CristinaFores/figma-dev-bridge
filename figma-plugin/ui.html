<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body {
    margin: 0;
    padding: 12px 16px;
    font-family: Inter, sans-serif;
    font-size: 12px;
    color: #333;
    background: #fff;
  }
  .row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #999; flex-shrink: 0; }
  .dot.connected { background: #18a247; }
  .dot.error     { background: #e53e3e; }
  #status    { color: #555; }
  #selection { color: #888; font-size: 11px; margin-bottom: 10px; }
  .actions { display: flex; gap: 6px; margin-bottom: 8px; }
  button {
    font-family: inherit;
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid #ddd;
    background: #f5f5f5;
    cursor: pointer;
  }
  button.primary { background: #18a247; border-color: #18a247; color: #fff; }
  button:disabled { opacity: 0.5; cursor: default; }
  #note { color: #999; font-size: 10px; line-height: 1.4; }
</style>
</head>
<body>
<div class="row">
  <div class="dot" id="dot"></div>
  <span id="status">Sync paused</span>
</div>
<div id="selection">No selection</div>

<div class="actions">
  <button id="syncBtn" class="primary">Sync selection</button>
  <button id="pauseBtn" disabled>Pause</button>
</div>

<div id="note">Only sends data to localhost. Does not modify your file.</div>

<script>
  var dot = document.getElementById('dot');
  var statusEl = document.getElementById('status');
  var selectionEl = document.getElementById('selection');
  var syncBtn = document.getElementById('syncBtn');
  var pauseBtn = document.getElementById('pauseBtn');

  syncBtn.onclick = function () {
    parent.postMessage({ pluginMessage: { type: 'sync' } }, '*');
  };
  pauseBtn.onclick = function () {
    parent.postMessage({ pluginMessage: { type: 'pause' } }, '*');
  };

  window.onmessage = function (event) {
    var msg = event.data.pluginMessage;
    if (!msg || msg.type !== 'status') return;

    var syncEnabled = !!msg.syncEnabled;
    syncBtn.disabled = syncEnabled;
    pauseBtn.disabled = !syncEnabled;

    if (!syncEnabled) {
      dot.className = 'dot';
      statusEl.textContent = 'Sync paused';
    } else if (msg.connected) {
      dot.className = 'dot connected';
      statusEl.textContent = 'Connected to local handoff tool';
    } else {
      dot.className = 'dot error';
      statusEl.textContent = 'Local handoff tool not running';
    }

    var count = msg.count || 0;
    selectionEl.textContent = count === 0
      ? 'No selection'
      : count + ' element' + (count === 1 ? '' : 's') + ' selected';
  };
</script>
</body>
</html>
